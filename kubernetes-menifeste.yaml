apiVersion: apps/v1
kind: Deployment
metadata:
  name: musta-deployment
  labels:
    app: musta
spec:
  replicas: 2
  selector:
    matchLabels:
      app: musta
  template:
    metadata:
      labels:
        app: musta
    spec:
      containers:
      - name: musta-container
        image: adil5800/musta:v2
        ports:
        - containerPort: 80
        
---
 apiVersion: v1
 kind: Service
 metadata:
   name: musta-service
 spec:
   type: ClusterIP
   selector:
     app: musta
   ports:
   - port: 80
     targetPort: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: musta-ingress
  namespace: musta
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  rules:
  - host: www.cyberrior.com
    http:
      paths:
      - path: /musta(/|$)(.*)
      #- path: /musta
        pathType: ImplementationSpecific
        #pathType: Prefix
        backend:
          service:
            name: musta-service
            port:
              number: 80     